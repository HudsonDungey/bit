[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
test    = "test"
solc    = "0.8.24"
optimizer        = true
optimizer_runs   = 200
via_ir           = true

[profile.default.fuzz]
runs = 256

fs_permissions = [
  { access = "read-write", path = "./"},
]

# Named RPC endpoints — referenced as `forge script --rpc-url sepolia`.
# Forge auto-loads contracts/.env, so SEPOLIA_RPC_URL there is picked up.
[rpc_endpoints]
anvil   = "http://127.0.0.1:8545"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
